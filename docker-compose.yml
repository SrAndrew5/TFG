version: '3.8'

services:
  # ============================================
  # PostgreSQL 16 — Base de datos principal
  # Reemplaza AWS RDS en desarrollo local
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: reservas_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: reservas_db
      POSTGRES_USER: reservas_user
      POSTGRES_PASSWORD: reservas_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reservas_user -d reservas_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MinIO — Almacenamiento de objetos (S3-compatible)
  # Reemplaza AWS S3 en desarrollo local
  # Consola web: http://localhost:9001
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: reservas_minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Consola web
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Mailpit — Servidor SMTP de desarrollo
  # Reemplaza AWS SES en desarrollo local
  # UI web: http://localhost:8025
  # ============================================
  mailpit:
    image: axllent/mailpit:latest
    container_name: reservas_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # UI web

volumes:
  postgres_data:
  minio_data:
